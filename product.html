<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product – PrimeNutra Wellness</title>
  <meta name="description" content="Organic herbal wellness product from PrimeNutra Wellness." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%BF%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <section class="section">
    <div class="container">
      <div class="breadcrumb" id="crumb" style="margin-bottom:18px"><a href="index.html">Home</a> / <a href="shop.html">Shop</a></div>
      <div class="pd" id="pd"></div>
    </div>
  </section>

  <section class="section" style="background:var(--green-50)">
    <div class="container">
      <div class="section-head"><h2>You May Also Like</h2></div>
      <div class="grid" id="related"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.pageRender = function () {
    var id = new URLSearchParams(location.search).get("id");
    var p = getProduct(id);
    var pd = document.getElementById("pd");
    if (!p) {
      pd.innerHTML = '<div class="empty" style="grid-column:1/-1">Product not found. <a href="shop.html">Back to shop</a></div>';
    } else {
      document.title = p.name + " – PrimeNutra Wellness";
      var disc = discountPct(p);
      var state = { size: p.sizes[0], qty: 1 };
      function render() {
        pd.innerHTML =
          '<div class="pd__media" style="background:' + window.catBg(p.category) + '">' + (p.image ? '<img class="pd__img" src="' + p.image + '" alt="' + p.name + '">' : '<span class="em">' + p.emoji + '</span>') + '</div>' +
          '<div>' +
            '<span class="card__cat">' + categoryName(p.category) + '</span>' +
            '<h1>' + p.name + '</h1>' +
            '<div class="card__rating" style="font-size:.9rem">★ ' + p.rating + ' <span>(' + p.reviews + ' reviews)</span></div>' +
            '<div class="pd__price"><b>' + PNW.formatINR(p.price) + '</b>' + (disc > 0 ? '<s>' + PNW.formatINR(p.mrp) + '</s><span class="off">' + disc + '% OFF</span>' : '') + '</div>' +
            '<p style="color:var(--muted)">' + p.desc + '</p>' +
            '<div><b style="font-size:.85rem">Size / Pack:</b><div class="pd__sizes">' +
              p.sizes.map(function (s) { return '<button class="chip' + (s === state.size ? ' active' : '') + '" data-size="' + s + '">' + s + '</button>'; }).join('') +
            '</div></div>' +
            '<div style="display:flex;gap:12px;align-items:center;margin:14px 0"><b style="font-size:.85rem">Qty:</b>' +
              '<div class="qty"><button id="qm">−</button><span id="qv">' + state.qty + '</span><button id="qp">+</button></div></div>' +
            '<ul class="pd__benefits">' + p.benefits.map(function (b) { return '<li>' + b + '</li>'; }).join('') + '</ul>' +
            '<div class="pd__buy">' +
              '<button class="btn btn--primary" id="addBtn">Add to Cart · ' + PNW.formatINR(p.price * state.qty) + '</button>' +
              '<a class="btn btn--amber" id="waBtn" target="_blank" rel="noopener">Order on WhatsApp</a>' +
              '<button class="btn btn--ghost" id="wishBtn" data-wish="' + p.id + '">♥ Wishlist</button>' +
            '</div>' +
            '<div style="margin-top:20px;display:flex;gap:18px;flex-wrap:wrap;font-size:.82rem;color:var(--muted)">' +
              '<span>🚚 Free delivery</span><span>💵 COD available</span><span>🔁 7-day returns</span><span>🌿 100% organic</span></div>' +
          '</div>';

        document.getElementById("crumb").innerHTML = '<a href="index.html">Home</a> / <a href="shop.html?category=' + p.category + '">' + categoryName(p.category) + '</a> / ' + p.name;

        pd.querySelectorAll(".chip").forEach(function (el) { el.addEventListener("click", function () { state.size = el.dataset.size; render(); }); });
        document.getElementById("qm").onclick = function () { state.qty = Math.max(1, state.qty - 1); render(); };
        document.getElementById("qp").onclick = function () { state.qty++; render(); };
        document.getElementById("addBtn").onclick = function () { PNW.addToCart(p.id, state.size, state.qty); };
        var wishBtn = document.getElementById("wishBtn");
        if (PNW.getWish().indexOf(p.id) > -1) wishBtn.classList.add("active");
        wishBtn.onclick = function () { toggleWish(p.id); };
        var wa = document.getElementById("waBtn");
        wa.href = "https://wa.me/919999999999?text=" + encodeURIComponent("Hi PrimeNutra, I'd like to order: " + p.name + " (" + state.size + ") x" + state.qty);
      }
      render();
      // Track recently viewed
      if (window.PNW_AUTH && window.PNW_AUTH.isLoggedIn() && window.PNW_ACCOUNT) {
        try { window.PNW_ACCOUNT.trackRecentlyViewed(p.id); } catch(e){}
      }
      // Load reviews from server
      if (window.PNW_API && window.PNW_API.getProductReviews) {
        window.PNW_API.getProductReviews(p.id).then(function(reviews) {
          if (!reviews || !reviews.length) return;
          var el = document.getElementById("reviewsSection");
          if (!el) {
            el = document.createElement("div");
            el.id = "reviewsSection";
            el.style.marginTop = "24px";
            pd.parentElement.appendChild(el);
          }
          el.innerHTML = '<h3 style="margin-bottom:12px">Customer Reviews</h3>' +
            reviews.map(function(r) {
              return '<div class="account-card"><b>' + "★".repeat(r.rating) + '</b>' +
                (r.title ? ' <b>' + r.title + '</b>' : '') +
                (r.verified_purchase ? ' <span class="pill green">Verified</span>' : '') +
                '<p>' + (r.body||"") + '</p>' +
                '<p class="ts">' + (r.created_at||"").substr(0,10) + '</p></div>';
            }).join("");
        }).catch(function(){});
      }
      // Load combo suggestions
      if (window.PNW_API && window.PNW_API.getCombos) {
        window.PNW_API.getCombos(p.id).then(function(combos) {
          if (!combos || !combos.length) return;
          var el = document.getElementById("comboSuggestions");
          if (!el) {
            el = document.createElement("div");
            el.id = "comboSuggestions";
            el.style.cssText = "margin-top:20px;padding:16px;background:#f0fdf4;border-radius:12px;border:1px solid #bbf7d0";
            pd.querySelector("div:last-child").appendChild(el);
          }
          el.innerHTML = '<h3 style="color:var(--green-800);margin-bottom:8px">🎁 Combo Offers</h3>' +
            combos.map(function(c) {
              return '<div style="margin-bottom:8px;padding:8px;background:#fff;border-radius:8px">' +
                '<b>' + c.name + '</b>' +
                (c.description ? '<p style="font-size:13px;color:#666">' + c.description + '</p>' : '') +
                '<p style="font-size:13px;color:var(--green-700)">Save ' +
                  (c.discount_type === 'percent' ? c.discount_value + '%' :
                   c.discount_type === 'flat' ? '₹' + c.discount_value :
                   c.discount_type === 'free' ? 'FREE product' : '₹' + c.bundle_price + ' bundle') +
                '</p></div>';
            }).join("");
        }).catch(function(){});
      }
      // related
      renderGrid("#related", PRODUCTS.filter(function (x) { return x.id !== p.id && (x.category === p.category || x.concerns.some(function (c) { return p.concerns.indexOf(c) > -1; })); }).slice(0, 4));
    }
    };
    window.pageRender();
  </script>
  <script src="js/api.js"></script>
</body>
</html>
