<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – PrimeNutra Wellness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%BF%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container"><h1>Checkout</h1><div class="breadcrumb"><a href="index.html">Home</a> / Checkout</div></div>
  </section>

  <section class="section">
    <div class="container" id="checkoutWrap"></div>
  </section>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    var wrap = document.getElementById("checkoutWrap");
    function money(n) { return PNW.formatINR(n); }

    function subtotal() { return PNW.getCart().reduce(function (s, i) { var p = getProduct(i.id); return s + (p ? p.price * i.qty : 0); }, 0); }
    function discountTier(sub) {
      if (sub >= 1599) return Math.round(sub * 0.12);
      if (sub >= 1299) return Math.round(sub * 0.10);
      if (sub >= 999) return Math.round(sub * 0.08);
      return 0;
    }

    function render() {
      var cart = PNW.getCart();
      if (!cart.length) {
        wrap.innerHTML = '<div class="empty">Your cart is empty 🛒<br><br><a class="btn btn--primary" href="shop.html">Start Shopping</a></div>';
        return;
      }
      var sub = subtotal();
      var disc = discountTier(sub);
      var shipping = 0; // free delivery
      var total = sub - disc + shipping;

      wrap.innerHTML =
        '<div class="checkout">' +
          '<form id="orderForm">' +
            '<h3 style="color:var(--green-900);margin-bottom:14px">Shipping Details</h3>' +
            '<div class="field"><label>Full Name *</label><input required name="name" placeholder="Your name" /></div>' +
            '<div class="field--row"><div class="field"><label>Phone *</label><input required name="phone" type="tel" placeholder="10-digit mobile" pattern="[0-9]{10}" /></div>' +
            '<div class="field"><label>Email</label><input name="email" type="email" placeholder="you@email.com" /></div></div>' +
            '<div class="field"><label>Address *</label><textarea required name="address" rows="2" placeholder="House no., street, area"></textarea></div>' +
            '<div class="field--row"><div class="field"><label>City *</label><input required name="city" /></div>' +
            '<div class="field"><label>State *</label><input required name="state" /></div></div>' +
            '<div class="field--row"><div class="field"><label>Pincode *</label><input required name="pincode" pattern="[0-9]{6}" /></div>' +
            '<div class="field"><label>Landmark</label><input name="landmark" /></div></div>' +
            '<h3 style="color:var(--green-900);margin:18px 0 12px">Payment Method</h3>' +
            '<div class="pay-opts">' +
              '<label class="active"><input type="radio" name="pay" value="COD" checked /> 💵 Cash on Delivery (COD)</label>' +
              '<label><input type="radio" name="pay" value="UPI" /> 📱 UPI / Online Payment</label>' +
            '</div>' +
          '</form>' +
          '<aside class="summary">' +
            '<h3 style="color:var(--green-900);margin-bottom:12px">Order Summary</h3>' +
            '<div id="sumItems"></div>' +
            '<div class="line"><span>Subtotal</span><span>' + money(sub) + '</span></div>' +
            (disc > 0 ? '<div class="line" style="color:var(--green-700)"><span>Discount</span><span>− ' + money(disc) + '</span></div>' : '') +
            '<div class="line"><span>Delivery</span><span style="color:var(--green-700)">FREE</span></div>' +
            '<div class="line grand"><span>Total</span><span>' + money(total) + '</span></div>' +
            '<button class="btn btn--primary btn--block" form="orderForm" style="margin-top:16px" type="submit">Place Order</button>' +
            '<a class="btn btn--ghost btn--block" id="waOrder" style="margin-top:8px" target="_blank" rel="noopener">Order via WhatsApp</a>' +
            (disc === 0 && sub < 999 ? '<p style="font-size:.78rem;color:var(--muted);margin-top:12px;text-align:center">Add ' + money(999 - sub) + ' more to unlock 8% off!</p>' : '') +
          '</aside>' +
        '</div>';

      document.getElementById("sumItems").innerHTML = cart.map(function (i) {
        var p = getProduct(i.id);
        return '<div class="line"><span>' + p.emoji + ' ' + p.name + ' <small style="color:var(--muted)">(' + i.size + ') ×' + i.qty + '</small></span><span>' + money(p.price * i.qty) + '</span></div>';
      }).join("");

      // payment toggle styling
      document.querySelectorAll('.pay-opts input').forEach(function (r) {
        r.addEventListener("change", function () {
          document.querySelectorAll('.pay-opts label').forEach(function (l) { l.classList.remove("active"); });
          r.closest("label").classList.add("active");
        });
      });

      // whatsapp order text
      var waText = "Hi PrimeNutra, I'd like to place an order:%0A" +
        cart.map(function (i) { var p = getProduct(i.id); return "• " + p.name + " (" + i.size + ") x" + i.qty + " - " + money(p.price * i.qty); }).join("%0A") +
        "%0ATotal: " + money(total);
      document.getElementById("waOrder").href = "https://wa.me/919999999999?text=" + waText;

      document.getElementById("orderForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        var orderId = "PNW" + Date.now().toString().slice(-8);
        wrap.innerHTML =
          '<div style="text-align:center;max-width:560px;margin:0 auto;padding:30px">' +
            '<div style="font-size:4rem">✅</div>' +
            '<h2 style="color:var(--green-900);margin:10px 0">Order Placed Successfully!</h2>' +
            '<p style="color:var(--muted)">Thank you, ' + (fd.get("name") || "") + '! Your order <b>#' + orderId + '</b> for <b>' + money(total) + '</b> (' + fd.get("pay") + ') has been received.</p>' +
            '<p style="color:var(--muted);margin-top:8px">We will call you on ' + fd.get("phone") + ' to confirm delivery. 🌿</p>' +
            '<div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">' +
              '<a class="btn btn--primary" href="shop.html">Continue Shopping</a>' +
              '<a class="btn btn--ghost" href="index.html">Back to Home</a></div>' +
          '</div>';
        PNW.setCart([]);
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }
    render();
  </script>
</body>
</html>
