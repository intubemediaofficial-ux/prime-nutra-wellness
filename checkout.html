<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – PrimeNutra Wellness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%BF%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container"><h1>Checkout</h1><div class="breadcrumb"><a href="index.html">Home</a> / Checkout</div></div>
  </section>

  <section class="section">
    <div class="container" id="checkoutWrap"></div>
  </section>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    var wrap = document.getElementById("checkoutWrap");
    function money(n) { return PNW.formatINR(n); }

    function subtotal() { return PNW.getCart().reduce(function (s, i) { var p = getProduct(i.id); return s + (p ? p.price * i.qty : 0); }, 0); }
    function discountTier(sub) {
      if (sub >= 1599) return Math.round(sub * 0.12);
      if (sub >= 1299) return Math.round(sub * 0.10);
      if (sub >= 999) return Math.round(sub * 0.08);
      return 0;
    }

    function successScreen(name, orderId, total, method, phone) {
      wrap.innerHTML =
        '<div style="text-align:center;max-width:560px;margin:0 auto;padding:30px">' +
          '<div style="font-size:4rem">✅</div>' +
          '<h2 style="color:var(--green-900);margin:10px 0">Order Placed Successfully!</h2>' +
          '<p style="color:var(--muted)">Thank you, ' + (name || "") + '! Your order <b>#' + orderId + '</b> for <b>' + money(total) + '</b> (' + method + ') has been received.</p>' +
          '<p style="color:var(--muted);margin-top:8px">We will call you on ' + phone + ' to confirm delivery. 🌿</p>' +
          '<div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">' +
            '<a class="btn btn--primary" href="shop.html">Continue Shopping</a>' +
            '<a class="btn btn--ghost" href="index.html">Back to Home</a></div>' +
        '</div>';
      PNW.setCart([]);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    window.pageRender = function () {
      var cart = PNW.getCart();
      if (!cart.length) {
        wrap.innerHTML = '<div class="empty">Your cart is empty 🛒<br><br><a class="btn btn--primary" href="shop.html">Start Shopping</a></div>';
        return;
      }
      var sub = subtotal();
      var disc = discountTier(sub);
      var shipping = 0; // free delivery
      var total = sub - disc + shipping;

      var cfg = (window.PNW_API && window.PNW_API.config) || { cod_enabled: true, razorpay_enabled: false };
      var payOpts = "";
      if (cfg.cod_enabled !== false) payOpts += '<label class="active"><input type="radio" name="pay" value="COD" checked /> 💵 Cash on Delivery (COD)</label>';
      if (cfg.razorpay_enabled) payOpts += '<label' + (cfg.cod_enabled === false ? ' class="active"' : '') + '><input type="radio" name="pay" value="Razorpay"' + (cfg.cod_enabled === false ? ' checked' : '') + ' /> 📱 Pay Online (UPI / Card / NetBanking)</label>';
      if (!payOpts) payOpts = '<label class="active"><input type="radio" name="pay" value="COD" checked /> 💵 Cash on Delivery (COD)</label>';

      wrap.innerHTML =
        '<div class="checkout">' +
          '<form id="orderForm">' +
            '<h3 style="color:var(--green-900);margin-bottom:14px">Shipping Details</h3>' +
            '<div class="field"><label>Full Name *</label><input required name="name" placeholder="Your name" /></div>' +
            '<div class="field--row"><div class="field"><label>Phone *</label><input required name="phone" type="tel" placeholder="10-digit mobile" pattern="[0-9]{10}" /></div>' +
            '<div class="field"><label>Email</label><input name="email" type="email" placeholder="you@email.com" /></div></div>' +
            '<div class="field"><label>Address *</label><textarea required name="address" rows="2" placeholder="House no., street, area"></textarea></div>' +
            '<div class="field--row"><div class="field"><label>City *</label><input required name="city" /></div>' +
            '<div class="field"><label>State *</label><input required name="state" /></div></div>' +
            '<div class="field--row"><div class="field"><label>Pincode *</label><input required name="pincode" pattern="[0-9]{6}" /></div>' +
            '<div class="field"><label>Landmark</label><input name="landmark" /></div></div>' +
            '<div class="field--row"><div class="field"><label>GST Number (optional)</label><input name="gst_number" placeholder="e.g. 22AAAAA0000A1Z5" /></div>' +
            '<div class="field"><label>Order Notes</label><input name="order_notes" placeholder="Any special instructions" /></div></div>' +
            '<div class="field" style="margin-top:12px"><label>Coupon Code</label><div style="display:flex;gap:8px"><input name="coupon" id="couponInput" placeholder="Enter coupon code" /><button type="button" class="btn btn--ghost btn--sm" id="applyCoupon">Apply</button></div><span id="couponMsg" style="font-size:12px;color:var(--green-700)"></span></div>' +
            '<h3 style="color:var(--green-900);margin:18px 0 12px">Payment Method</h3>' +
            '<div class="pay-opts">' + payOpts + '</div>' +
          '</form>' +
          '<aside class="summary">' +
            '<h3 style="color:var(--green-900);margin-bottom:12px">Order Summary</h3>' +
            '<div id="sumItems"></div>' +
            '<div class="line"><span>Subtotal</span><span>' + money(sub) + '</span></div>' +
            (disc > 0 ? '<div class="line" style="color:var(--green-700)"><span>Discount</span><span>− ' + money(disc) + '</span></div>' : '') +
            '<div class="line"><span>Delivery</span><span style="color:var(--green-700)">FREE</span></div>' +
            '<div id="taxLine"></div>' +
            '<div class="line grand"><span>Total</span><span id="grandTotal">' + money(total) + '</span></div>' +
            '<button class="btn btn--primary btn--block" form="orderForm" style="margin-top:16px" type="submit">Place Order</button>' +
            '<a class="btn btn--ghost btn--block" id="waOrder" style="margin-top:8px" target="_blank" rel="noopener">Order via WhatsApp</a>' +
            (disc === 0 && sub < 999 ? '<p style="font-size:.78rem;color:var(--muted);margin-top:12px;text-align:center">Add ' + money(999 - sub) + ' more to unlock 8% off!</p>' : '') +
          '</aside>' +
        '</div>';

      document.getElementById("sumItems").innerHTML = cart.map(function (i) {
        var p = getProduct(i.id);
        return '<div class="line"><span>' + p.emoji + ' ' + p.name + ' <small style="color:var(--muted)">(' + i.size + ') ×' + i.qty + '</small></span><span>' + money(p.price * i.qty) + '</span></div>';
      }).join("");

      // payment toggle styling
      document.querySelectorAll('.pay-opts input').forEach(function (r) {
        r.addEventListener("change", function () {
          document.querySelectorAll('.pay-opts label').forEach(function (l) { l.classList.remove("active"); });
          r.closest("label").classList.add("active");
        });
      });

      // whatsapp order text
      var waText = "Hi PrimeNutra, I'd like to place an order:%0A" +
        cart.map(function (i) { var p = getProduct(i.id); return "• " + p.name + " (" + i.size + ") x" + i.qty + " - " + money(p.price * i.qty); }).join("%0A") +
        "%0ATotal: " + money(total);
      document.getElementById("waOrder").href = "https://wa.me/919999999999?text=" + waText;

      // Coupon apply
      var appliedCoupon = "";
      var couponDiscount = 0;
      document.getElementById("applyCoupon").onclick = function() {
        var code = document.getElementById("couponInput").value.trim();
        if (!code) return;
        // Server-side quote to validate coupon
        if (window.PNW_API && window.PNW_API.checkoutQuote) {
          window.PNW_API.checkoutQuote({
            items: PNW.getCart().map(function(i) { return { id: i.id, qty: i.qty }; }),
            coupon_code: code, state: document.querySelector('[name=state]').value || "Maharashtra"
          }).then(function(q) {
            if (q.coupon_discount > 0) {
              appliedCoupon = code;
              couponDiscount = q.coupon_discount;
              document.getElementById("couponMsg").textContent = "Coupon applied! Saving " + money(q.coupon_discount);
              document.getElementById("couponMsg").style.color = "var(--green-700)";
              document.getElementById("grandTotal").textContent = money(q.total);
              if (q.tax_amount) document.getElementById("taxLine").innerHTML = '<div class="line"><span>Tax (GST)</span><span>' + money(q.tax_amount) + '</span></div>';
            } else {
              document.getElementById("couponMsg").textContent = "Coupon not applicable";
              document.getElementById("couponMsg").style.color = "red";
            }
          }).catch(function(e) {
            document.getElementById("couponMsg").textContent = e.message;
            document.getElementById("couponMsg").style.color = "red";
          });
        }
      };

      document.getElementById("orderForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        var method = fd.get("pay") === "Razorpay" ? "Razorpay" : "COD";
        var submitBtn = e.target.querySelector('[type="submit"]') || document.querySelector('[form="orderForm"]');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Placing order…"; }
        var localFallback = function () {
          var orderId = "PNW" + Date.now().toString().slice(-8);
          successScreen(fd.get("name"), orderId, total, method, fd.get("phone"));
        };
        if (!window.PNW_API) { localFallback(); return; }
        var payload = {
          customer_name: fd.get("name"), phone: fd.get("phone"), email: fd.get("email") || "",
          address: fd.get("address"), city: fd.get("city"), state: fd.get("state"),
          pincode: fd.get("pincode"), landmark: fd.get("landmark") || "", payment_method: method,
          gst_number: fd.get("gst_number") || "", order_notes: fd.get("order_notes") || "",
          coupon_code: appliedCoupon || "",
          items: PNW.getCart().map(function (i) { return { id: i.id, size: i.size, qty: i.qty }; })
        };
        window.PNW_API.placeOrder(payload).then(function (order) {
          if (method === "Razorpay") {
            return window.PNW_API.createRazorpay(order.id).then(function (pr) {
              var rz = new Razorpay({
                key: pr.key_id, amount: pr.amount, currency: pr.currency,
                name: "PrimeNutra Wellness", description: "Order " + order.id, order_id: pr.razorpay_order_id,
                prefill: { name: order.customer_name, contact: order.phone, email: order.email },
                theme: { color: "#1b6b3c" },
                handler: function (resp) {
                  window.PNW_API.verifyRazorpay({
                    order_id: order.id, razorpay_order_id: resp.razorpay_order_id,
                    razorpay_payment_id: resp.razorpay_payment_id, razorpay_signature: resp.razorpay_signature
                  }).then(function () {
                    successScreen(order.customer_name, order.id, order.total, "Paid online", order.phone);
                  }).catch(function () { alert("Payment verification failed. Please contact support with order " + order.id); });
                },
                modal: { ondismiss: function () {
                  if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Place Order"; }
                  PNW.toast("Payment cancelled — order " + order.id + " saved as pending");
                } }
              });
              rz.open();
            });
          }
          successScreen(order.customer_name, order.id, order.total, "COD", order.phone);
        }).catch(function () { localFallback(); });
      });
    };
    window.pageRender();
  </script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/api.js"></script>
</body>
</html>
