<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellness Blog – PrimeNutra Wellness</title>
  <meta name="description" content="Health tips, Ayurvedic guides and wellness articles from PrimeNutra Wellness." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%BF%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container"><h1>Wellness Blog</h1><div class="breadcrumb"><a href="index.html">Home</a> / Wellness Blog</div></div>
  </section>

  <section class="section">
    <div class="container">
      <div class="grid" id="blogGrid"></div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    var posts = [
      ["🌿", "5 Benefits of Adding Tulsi to Your Daily Routine", "Discover how holy basil supports immunity, reduces stress and improves overall wellbeing.", "Immunity"],
      ["💪", "Ashwagandha: The Ancient Herb for Modern Stress", "Learn how this powerful adaptogen helps your body manage stress and boosts energy.", "Stress & Energy"],
      ["🍵", "Green Tea vs Herbal Tea: Which Is Right for You?", "A simple guide to choosing the perfect cup for your health goals.", "Nutrition"],
      ["🥗", "Superfoods 101: Moringa, Spirulina & Wheatgrass", "Everything you need to know about adding superfood powders to your diet.", "Nutrition"],
      ["😴", "Natural Ways to Improve Your Sleep", "From chamomile tea to ashwagandha — herbal remedies for restful nights.", "Sleep"],
      ["🫀", "Heart-Healthy Habits Backed by Ayurveda", "Simple lifestyle and dietary tips to keep your heart strong naturally.", "Heart Care"]
    ];
    document.getElementById("blogGrid").innerHTML = posts.map(function (p) {
      return '<article class="card"><div class="card__media" style="background:linear-gradient(135deg,#e7f6ed,#cdeede)"><span class="em">' + p[0] + '</span></div>' +
        '<div class="card__body"><span class="card__cat">' + p[3] + '</span><a class="card__title" href="#">' + p[1] + '</a>' +
        '<p style="font-size:.85rem;color:var(--muted);margin-bottom:12px">' + p[2] + '</p>' +
        '<a class="btn btn--ghost btn--sm" href="#" style="margin-top:auto;align-self:flex-start">Read More</a></div></article>';
    }).join("");
  </script>
</body>
</html>
